title = "rct-platform Gitleaks Configuration"

# ─────────────────────────────────────────────────────────────────────────────
# Allowlist for known false positives in documentation and example files.
# rct-platform is a PUBLIC SDK repo — it does not contain real credentials.
# Any credential-looking string here is an intentional placeholder / example.
# ─────────────────────────────────────────────────────────────────────────────

[allowlist]
description = "Documentation, example, and env-template false positives"

# Paths whose findings are entirely ignored
paths = [
    # Environment variable template — values are placeholders, not real keys
    '''.env.example''',
    # Documentation pages — may contain example key formats
    '''docs/''',
    # Code examples — contain placeholder credentials for illustration
    '''examples/''',
    # Changelog and contributing docs
    '''CHANGELOG.md''',
    '''CONTRIBUTING.md''',
    '''SECURITY.md''',
]

# Specific plaintext patterns that are definitively placeholder values
regexes = [
    # Generic placeholder patterns used in docs/examples
    '''YOUR_API_KEY''',
    '''YOUR_TOKEN''',
    '''YOUR_JWT_TOKEN''',
    '''YOUR_SECRET''',
    # Stripe test-key placeholder format
    '''sk_test_placeholder''',
    '''sk_live_placeholder''',
    # Curl example placeholder
    '''Bearer YOUR_''',
]
