name: Security Scan

on:
  schedule:
    - cron: "0 3 * * *"  # Daily at 03:00 UTC
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gitleaks:
    name: Secret Detection (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v5
        with:
          # Full history required so gitleaks can scan all commits
          fetch-depth: 0

      - name: Install gitleaks binary
        # gitleaks-action@v2 requires GITLEAKS_LICENSE for org accounts.
        # The binary has no such restriction and is free to use.
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.1/gitleaks_8.18.1_linux_x64.tar.gz \
            | tar -xz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version

      - name: Run gitleaks secret scan
        # .gitleaks.toml provides allowlist for doc/example false-positives
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --verbose \
            --no-banner \
            --redact

  cve-scan:
    name: CVE Scan (safety)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install pip-audit
        # pip-audit replaces safety v3 which requires a paid API key.
        # pip-audit is free, maintained by PyPA, and needs no authentication.
        run: pip install pip-audit

      - name: CVE scan — requirements.txt
        # continue-on-error: report vulnerabilities but do not block the build.
        # Remove this once all flagged packages are upgraded.
        run: |
          mkdir -p artifacts/security
          pip-audit -r requirements.txt \
            --desc on \
            --format json \
            --output artifacts/security/pip-audit.json \
            --progress-spinner off \
            || (cat artifacts/security/pip-audit.json ; exit 1)
        continue-on-error: true

      - name: Upload CVE report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: cve-report-${{ github.sha }}
          path: artifacts/security/pip-audit.json
          retention-days: 30

  bandit:
    name: SAST (bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        # Fail the build when HIGH severity issues are found (-lll).
        # Medium/low issues are still reported in the artifact but do not block.
        run: |
          mkdir -p artifacts/security
          bandit -r core/ signedai/ rct_control_plane/ microservices/ \
            --exclude .venv,venv,tests,build,dist \
            -lll \
            -f json \
            -o artifacts/security/bandit.json
          echo "Bandit scan complete — see artifact for findings."

      - name: Upload results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: bandit-results
          path: artifacts/security/bandit.json
