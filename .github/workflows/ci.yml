name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      # Do not cancel other matrix versions when one fails
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov cryptography

      - name: Run tests
        run: |
          python -m pytest --cov=microservices --cov=core --cov=signedai --cov=rct_control_plane \
            --cov-report=xml --cov-fail-under=70 -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install tools
        run: |
          pip install mypy bandit

      - name: Bandit security lint
        # Fail CI on HIGH severity findings. Medium/low are reported but allowed.
        run: |
          bandit -r core/ signedai/ rct_control_plane/ microservices/ -lll

      - name: Mypy type check
        # explicit-package-bases prevents "source file found twice" for sub-packages
        # when mypy is invoked with directory paths instead of dotted package names.
        run: |
          mypy core/ signedai/ rct_control_plane/ --ignore-missing-imports --explicit-package-bases
