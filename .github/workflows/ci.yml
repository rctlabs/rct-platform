name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      # Do not cancel other matrix versions when one fails
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov cryptography hypothesis

      - name: Run tests
        run: |
          python -m pytest --cov=microservices --cov=core --cov=signedai --cov=rct_control_plane \
            --cov-report=xml --cov-fail-under=90 -v

      - name: Run hypothesis property tests (CI profile — 50 examples)
        run: |
          python -m pytest tests/hypothesis/ --hypothesis-profile=ci -v

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: rctlabs/rct-platform
          verbose: true
          fail_ci_if_error: false

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install tools
        run: |
          pip install mypy bandit ruff

      - name: Ruff lint
        run: |
          ruff check core/ signedai/ rct_control_plane/ microservices/ --output-format=github

      - name: Ruff format check
        # Report only — does not block CI (legacy codebase has many unformatted files)
        run: |
          ruff format --check core/ signedai/ rct_control_plane/ microservices/
        continue-on-error: true

      - name: Bandit security lint
        # Fail CI on HIGH severity findings. Medium/low are reported but allowed.
        run: |
          bandit -r core/ signedai/ rct_control_plane/ microservices/ -lll

      - name: Mypy type check
        # explicit-package-bases prevents "source file found twice" for sub-packages
        # when mypy is invoked with directory paths instead of dotted package names.
        run: |
          mypy core/ signedai/ rct_control_plane/ --ignore-missing-imports --explicit-package-bases
