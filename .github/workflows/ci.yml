name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      # Do not cancel other matrix versions when one fails
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov cryptography

      - name: Run tests
        run: |
          python -m pytest --cov=microservices --cov=core --cov=signedai --cov=rct_control_plane \
            --cov-report=xml --cov-fail-under=70 -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install tools
        run: |
          pip install mypy bandit

      - name: Bandit security lint
        # Fail on HIGH severity findings only. Medium/low findings are reported
        # but do not block the build (-ll = low level and above reported, -lll = high only fails).
        # Remove --exit-zero once the backlog of findings is triaged and cleared.
        run: |
          bandit -r core/ signedai/ rct_control_plane/ microservices/ \
            -lll --exit-zero

      - name: Mypy type check
        # All 22 pre-existing type errors resolved in fixdata-maintenancedata-1504.
        # Gate is now hard — any new type error will fail CI.
        run: |
          mypy core/ signedai/ rct_control_plane/ --ignore-missing-imports
