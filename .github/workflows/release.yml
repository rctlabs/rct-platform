name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    environment: pypi          # GitHub Environment — enables protection rules + OIDC scope
    permissions:
      contents: write   # create GitHub Release
      id-token: write   # trusted PyPI publishing (OIDC)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Extract release notes from CHANGELOG
        id: changelog
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip leading 'v' then normalise dash-alpha → 'a' suffix
          VER="${TAG#v}"
          # Capture the section for this tag (stop at next ## heading)
          NOTES=$(awk "/^## \[${VER}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}

      - name: Verify distribution integrity
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to TestPyPI (dry-run)
        # Validates the distribution against TestPyPI before touching production.
        # continue-on-error so a TestPyPI outage never blocks a production release.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
        continue-on-error: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
